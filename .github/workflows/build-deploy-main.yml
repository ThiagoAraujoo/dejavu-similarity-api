name: Deploy Similarity API

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-22.04 
    environment: main
    env:
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build application
        run: |
          echo "=== BUILDING APPLICATION IN RELEASE MODE ==="
          cargo clean
          cargo build --release
          
          # Verify binary was created
          if [ -f "target/release/dejavu-similarity-api" ]; then
            ls -la target/release/dejavu-similarity-api
            file target/release/dejavu-similarity-api
          else
            echo "❌ Failed to build binary"
            exit 1
          fi
      
      - name: Generate Environment File
        run: |
          # Ensure all required environment variables are set
          # Ensure all required environment variables are set
          APP_PORT="${{ vars.APP_PORT }}"
          NODE_ENV="${{ vars.NODE_ENV }}"
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          WEBSOCKET_AUTH_TOKEN="${{ secrets.WEBSOCKET_AUTH_TOKEN }}"
          SEMANTIC_DETECTOR_PATH="${{ vars.SEMANTIC_DETECTOR_PATH }}"
          SIMILARITY_SERVICE_URL="${{ vars.SIMILARITY_SERVICE_URL }}"
          SIMILARITY_MODEL_NAME="${{ vars.SIMILARITY_MODEL_NAME }}"
          SIMILARITY_MODEL_PATH="${{ vars.SIMILARITY_MODEL_PATH }}"
          SIMILARITY_WORKERS="${{ vars.SIMILARITY_WORKERS }}"
          SIMILARITY_WINDOW_SIZE="${{ vars.SIMILARITY_WINDOW_SIZE }}"
          SIMILARITY_WINDOW_OVERLAP="${{ vars.SIMILARITY_WINDOW_OVERLAP }}"
          SIMILARITY_THRESHOLD="${{ vars.SIMILARITY_THRESHOLD }}"
          AUTO_APPROVAL_THRESHOLD="${{ vars.AUTO_APPROVAL_THRESHOLD }}"
          PARTIAL_MATCH_THRESHOLD="${{ vars.PARTIAL_MATCH_THRESHOLD }}"
          MAX_CONCURRENT_TASKS="${{ vars.MAX_CONCURRENT_TASKS }}"
          TASK_TIMEOUT_SECONDS="${{ vars.TASK_TIMEOUT_SECONDS }}"
          RUST_LOG="${{ vars.RUST_LOG }}"
          
          # Use defaults if variables are empty
          echo "APP_PORT=${APP_PORT:-3000}" > .env
          echo "NODE_ENV=${NODE_ENV:-production}" >> .env
          echo "JWT_SECRET=${JWT_SECRET}" >> .env
          echo "WEBSOCKET_AUTH_TOKEN=${WEBSOCKET_AUTH_TOKEN}" >> .env
          echo "SEMANTIC_DETECTOR_PATH=${SEMANTIC_DETECTOR_PATH:-/opt/dejavu/backend/scripts/semantic_similarity_detector.py}" >> .env
          echo "SIMILARITY_SERVICE_URL=${SIMILARITY_SERVICE_URL:-http://127.0.0.1:8002/detect}" >> .env
          echo "SIMILARITY_MODEL_NAME=${SIMILARITY_MODEL_NAME:-paraphrase-multilingual-MiniLM-L12-v2}" >> .env
          echo "SIMILARITY_MODEL_PATH=${SIMILARITY_MODEL_PATH:-/opt/dejavu/backend/models/sentence-transformer}" >> .env
          echo "SIMILARITY_WORKERS=${SIMILARITY_WORKERS:-4}" >> .env
          echo "SIMILARITY_WINDOW_SIZE=${SIMILARITY_WINDOW_SIZE:-50}" >> .env
          echo "SIMILARITY_WINDOW_OVERLAP=${SIMILARITY_WINDOW_OVERLAP:-25}" >> .env
          echo "SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-80.0}" >> .env
          echo "AUTO_APPROVAL_THRESHOLD=${AUTO_APPROVAL_THRESHOLD:-70.0}" >> .env
          echo "PARTIAL_MATCH_THRESHOLD=${PARTIAL_MATCH_THRESHOLD:-30.0}" >> .env
          echo "MAX_CONCURRENT_TASKS=${MAX_CONCURRENT_TASKS:-4}" >> .env
          echo "TASK_TIMEOUT_SECONDS=${TASK_TIMEOUT_SECONDS:-30}" >> .env
          echo "RUST_LOG=${RUST_LOG:-info}" >> .env
          
          # Validate critical variables
          if [ -z "$JWT_SECRET" ]; then
            echo "⚠️  WARNING: JWT_SECRET is not set, using default"
          fi
          
          cat .env

      - name: Prepare SSH access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy application to server
        run: |
          # Create temporary deployment directory in home folder
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "mkdir -p ~/dejavu-deploy"
          
          # Copy binary and configuration files to home directory first
          echo "Deploying binary and configuration..."
          scp target/release/dejavu-similarity-api ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:~/dejavu-deploy/
          scp .env ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:~/dejavu-deploy/
          
          # Copy Python scripts
          echo "Deploying Python scripts..."
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "mkdir -p ~/dejavu-deploy/scripts"
          scp src/core/scripts/semantic_similarity_detector.py ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:~/dejavu-deploy/scripts/
          scp src/core/scripts/download_model.py ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:~/dejavu-deploy/scripts/
          scp src/core/scripts/similarity_service.py ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:~/dejavu-deploy/scripts/
                    
          # Move files to /opt with sudo
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            echo "Moving files to /opt/dejavu/backend..."
            sudo mkdir -p /opt/dejavu/backend
            
            # Remove old files except .env (to preserve manual edits during debugging)
            sudo find /opt/dejavu/backend -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} + 2>/dev/null || true
            
            # Copy all files including hidden ones
            sudo cp -r ~/dejavu-deploy/* /opt/dejavu/backend/ 2>/dev/null || true
            sudo cp ~/dejavu-deploy/.env /opt/dejavu/backend/.env 2>/dev/null || echo "Warning: .env not found in ~/dejavu-deploy/"
            
            # Verify .env was copied
            if [ -f /opt/dejavu/backend/.env ]; then
              echo "✅ .env file deployed successfully"
            else
              echo "❌ ERROR: .env file NOT deployed!"
            fi
            
            # Set permissions
            sudo chmod +x /opt/dejavu/backend/dejavu-similarity-api
            sudo chmod 600 /opt/dejavu/backend/.env 2>/dev/null || true
            
            # Create logs directory
            sudo mkdir -p /opt/dejavu/backend/logs
            sudo chmod 755 /opt/dejavu/backend/logs
            
            # Set ownership
            sudo chown -R root:root /opt/dejavu/backend
            
            # Cleanup
            rm -rf ~/dejavu-deploy
            
            echo "✅ Files deployed successfully"
            ls -la /opt/dejavu/backend/
          EOF

      - name: Install Python dependencies on deployment server
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=10 ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'

            echo "=== INSTALLING PYTHON DEPENDENCIES ==="
            
            # Check if Python3 is installed
            if command -v python3 &> /dev/null; then
              echo "Python3 is already installed:"
              python3 --version
            else
              echo "Installing Python3..."
              sudo apt-get update
              sudo apt-get install -y python3 python3-pip
              echo "✅ Python3 installed successfully"
            fi
            
            # Upgrade pip first
            sudo pip3 install --break-system-packages --upgrade pip
            
            # Install PyTorch with CUDA 12.1
            echo "Installing PyTorch with CUDA 12.1..."
            sudo pip3 uninstall -y torch 2>/dev/null || true
            sudo pip3 install --break-system-packages \
              "torch>=2.0.0,<3.0.0" \
              --index-url https://download.pytorch.org/whl/cu121
            
            # Install sentence-transformers with compatible dependencies
            echo "Installing sentence-transformers and dependencies..."
            sudo pip3 install --break-system-packages \
              "huggingface-hub>=0.34.0,<1.0" \
              "transformers>=4.30.0,<5.0.0" \
              "sentence-transformers>=2.2.0,<4.0.0"
            
            # Install FastAPI and uvicorn for similarity service
            echo "Installing FastAPI and uvicorn..."
            sudo pip3 install --break-system-packages \
              "fastapi>=0.104.0,<1.0.0" \
              "uvicorn[standard]>=0.24.0,<1.0.0"
            
            # Verify installations
            echo "Verifying Python packages..."
            
            # Verify PyTorch with CUDA
            echo "Verifying PyTorch and CUDA..."
            python3 -c "import torch; print('✅ PyTorch version:', torch.__version__); print('   CUDA available:', torch.cuda.is_available())" || echo "⚠️  PyTorch verification failed"
            
            # Verify sentence-transformers
            if python3 -c "import sentence_transformers" 2>/dev/null; then
              echo "✅ sentence-transformers installed successfully"
              python3 -c "from sentence_transformers import SentenceTransformer; print('   SentenceTransformer module loaded')"
            else
              echo "❌ ERROR: sentence-transformers not found!"
              exit 1
            fi
            
            echo "✅ All Python dependencies installed successfully"
          EOF

      - name: Download similarity model locally
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=10 ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            echo "=== DOWNLOADING SIMILARITY MODEL ==="
            
            set -a
            source /opt/dejavu/backend/.env
            set +a
            
            sudo python3 /opt/dejavu/backend/scripts/download_model.py
            sudo ls -la "${SIMILARITY_MODEL_PATH:-/opt/dejavu/backend/models/sentence-transformer}"
          EOF

      - name: Setup systemd services
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            echo "=== SETTING UP SYSTEMD SERVICES ==="
            
            # Create similarity service systemd file
            sudo tee /etc/systemd/system/dejavu-similarity-service.service > /dev/null << 'SIMILARITY_SERVICE_EOF'
          [Unit]
          Description=Dejavu Similarity Detection Service
          After=network.target
          
          [Service]
          Type=simple
          User=root
          Group=root
          WorkingDirectory=/opt/dejavu/backend/scripts
          EnvironmentFile=/opt/dejavu/backend/.env
          ExecStart=/usr/bin/python3 /opt/dejavu/backend/scripts/similarity_service.py
          Restart=always
          RestartSec=5
          
          [Install]
          WantedBy=multi-user.target
          SIMILARITY_SERVICE_EOF
            
            # Create main API systemd service file
            sudo tee /etc/systemd/system/dejavu-similarity-api.service > /dev/null << 'SERVICE_EOF'
          [Unit]
          Description=Dejavu API Rust Backend
          After=network.target dejavu-similarity-service.service
          Wants=dejavu-similarity-service.service
          
          [Service]
          Type=simple
          User=root
          Group=root
          WorkingDirectory=/opt/dejavu/backend
          Environment=RUST_LOG=info
          EnvironmentFile=/opt/dejavu/backend/.env
          ExecStart=/opt/dejavu/backend/dejavu-similarity-api
          ExecReload=/bin/kill -HUP $MAINPID
          KillMode=mixed
          KillSignal=SIGINT
          TimeoutStopSec=5
          Restart=always
          RestartSec=10
          
          # Resource limits
          LimitNOFILE=65536
          
          [Install]
          WantedBy=multi-user.target
          SERVICE_EOF
            
            # Permissions already set during deployment
            
            # Reload systemd and enable services
            sudo systemctl daemon-reload
            sudo systemctl enable dejavu-similarity-service.service
            sudo systemctl enable dejavu-similarity-api.service
            
            echo "✅ Systemd services configured"
          EOF

      - name: Start application services
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            echo "=== STARTING APPLICATION SERVICES ==="
            
            # Stop existing services if running
            sudo systemctl stop dejavu-similarity-api.service || echo "API service was not running"
            sudo systemctl stop dejavu-similarity-service.service || echo "Similarity service was not running"
            
            # Start similarity service first
            sudo systemctl start dejavu-similarity-service.service
            sleep 5
            
            # Start the API service
            sudo systemctl start dejavu-similarity-api.service
            
            # Wait for service to initialize
            sleep 10
            
            # Check service status
            echo "Service status:"
            sudo systemctl status dejavu-similarity-api.service --no-pager -l
            
            # Show detailed logs for debugging
            echo "=== DETAILED STARTUP LOGS ==="
            sudo journalctl -u dejavu-similarity-api.service --no-pager -l -n 20 --since "2 minutes ago"
          EOF

      - name: Verify deployment
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            echo "=== DEPLOYMENT VERIFICATION ==="
                        
            # Check if service is active
            if sudo systemctl is-active --quiet dejavu-similarity-api.service; then
              echo "✅ Service is running successfully"
              
              # Test API endpoint
              echo "Testing API health:"
              sleep 5
              APP_PORT=$(grep APP_PORT /opt/dejavu/backend/.env | cut -d'=' -f2)
              curl -f "http://localhost:${APP_PORT:-3000}/health" || echo "Health endpoint not available"
              
            else
              echo "❌ Service failed to start"
              
              # Show detailed status and logs for debugging
              echo "Service status:"
              sudo systemctl status dejavu-similarity-api.service --no-pager -l
              
              echo "Recent error logs:"
              sudo journalctl -u dejavu-similarity-api.service --no-pager -l -n 50
              
              echo "Environment file:"
              cat /opt/dejavu/backend/.env
              
              echo "Binary permissions:"
              ls -la /opt/dejavu/backend/dejavu-similarity-api
              
              exit 1
            fi
          EOF